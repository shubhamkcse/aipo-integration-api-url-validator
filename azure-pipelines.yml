trigger:
- main  # Trigger on changes to the main branch

pool:
  name: 'Self-hosted pool'  # Use a self-hosted agent pool or a Microsoft-hosted pool as per your setup

variables:
  javaVersion: '11'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean install'
        options: '-B'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '$(javaVersion)'
        mavenVersionOption: 'Default'

- stage: Test
  displayName: 'Test Stage'
  dependsOn: Build
  jobs:
  - job: TestJob
    displayName: 'Test Job'
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'
        options: '-B'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '$(javaVersion)'
        mavenVersionOption: 'Default'

- stage: DeployToDev
  displayName: 'Deploy to Dev Stage'
  dependsOn: Test
  condition: succeeded()  # Deploy only if previous stages (Test) succeed
  jobs:
  - deployment: DeployToDevJob
    displayName: 'Deploy to Dev'
    environment: 'Dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo 'Deploying to Dev environment...'
            displayName: 'Deploy steps'
          # Add deployment steps for Dev environment, e.g., Azure App Service, Kubernetes, etc.

- stage: DeployToProd
  displayName: 'Deploy to Prod Stage'
  dependsOn: Test
  condition: succeeded()  # Deploy only if previous stages (Test) succeed
  jobs:
  - deployment: DeployToProdJob
    displayName: 'Deploy to Production'
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo 'Deploying to Production environment...'
            displayName: 'Deploy steps'
          # Add deployment steps for Production environment, e.g., Azure App Service, Kubernetes, etc.
