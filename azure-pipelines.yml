trigger:
- main

pool:
  name: 'Default'

variables:
  javaVersion: '11'
  CUSTOM_DOCKER_ACTION_RETRIES: 'true'
  CUSTOM_USE_GIT_LONG_PATHS: 'true'
  CUSTOM_ENABLE_ISSUE_SOURCE_VALIDATION: 'true'
  CUSTOM_AGENT_ENABLE_PIPELINEARTIFACT_LARGE_CHUNK_SIZE: 'true'
  CUSTOM_CONTINUE_AFTER_CANCEL_PROCESSTREEKILL_ATTEMPT: 'true'
  CUSTOM_AZP_75787_ENABLE_NEW_LOGIC: 'false'
  CUSTOM_AZP_75787_ENABLE_NEW_LOGIC_LOG: 'false'
  CUSTOM_AZP_75787_ENABLE_COLLECT: 'true'
  CUSTOM_AZP_75787_ENABLE_NEW_PH_LOGIC: 'true'
  CUSTOM_AZP_AGENT_IGNORE_VSTSTASKLIB: 'true'
  CUSTOM_FAIL_JOB_WHEN_AGENT_DIES: 'true'
  CUSTOM_AZP_AGENT_CHECK_FOR_TASK_DEPRECATION: 'true'
  CUSTOM_AZP_AGENT_MOUNT_WORKSPACE: 'true'
  CUSTOM_AZP_AGENT_LOG_TASKNAME_IN_USERAGENT: 'true'
  CUSTOM_AGENT_USE_FETCH_FILTER_IN_CHECKOUT_TASK: 'true'
  CUSTOM_ROSETTA2_WARNING: 'true'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean install'
        options: '-B'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '$(javaVersion)'
        mavenVersionOption: 'Default'

- stage: Test
  displayName: 'Test Stage'
  dependsOn: Build
  jobs:
  - job: TestJob
    displayName: 'Test Job'
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'
        options: '-B'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '$(javaVersion)'
        mavenVersionOption: 'Default'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy Job'
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo 'Deploying to Production...'
            displayName: 'Deploy steps'
          # Add your deployment steps here, e.g., using SSH, Azure CLI, etc.
  
